<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Загрузка сервера</title>
<style>
*{
    margin:0;
    padding:0;
}
body{
    background: url("background.jpg") no-repeat center center fixed;
    background-size: cover;
    overflow: hidden;
}
</style>
</head>
<body>

<audio autoplay loop id="bgMusic">
    <source src="" type="audio/ogg">
</audio>

<script>
const musicList = [
    "slumpscreen.ogg",
    "fallingupscreen.ogg"
];

const randomTrack = musicList[Math.floor(Math.random() * musicList.length)];
const audio = document.getElementById('bgMusic');
audio.querySelector('source').src = randomTrack;
audio.load();
audio.play();
</script>

</body>
</html>
