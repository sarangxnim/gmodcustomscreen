<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Загрузка сервера...</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: url("background.jpg") no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Затемнение */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
}

/* Прогресс контейнер */
.progress-container {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 35px;
    background: rgba(0, 0, 0, 0.8);
}

/* Полоса */
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff99, #00ccff);
    transition: width 0.2s;
}

/* Текст процента */
.progress-text {
    position: fixed;
    bottom: 45px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    text-shadow: 0 0 10px black;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="progress-text">Загрузка: 0%</div>

<div class="progress-container">
    <div class="progress-bar" id="bar"></div>
</div>

<audio autoplay loop>
    <source src="slumpscreen.ogg" type="audio/ogg">
</audio>

<script>
// GMod loading events
function SetStatusChanged(status) {
    console.log(status);
}

function SetFilesNeeded(needed) {
    console.log("Нужно файлов: " + needed);
}

function SetFilesTotal(total) {
    console.log("Всего файлов: " + total);
}

function DownloadingFile(file) {
    console.log("Загрузка файла: " + file);
}

function SetProgress(progress) {
    let percent = Math.round(progress * 100);
    document.getElementById("bar").style.width = percent + "%";
    document.querySelector(".progress-text").innerText = "Загрузка: " + percent + "%";
}
</script>

</body>
</html>
